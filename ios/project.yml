name: PetitesNuits
options:
  bundleIdPrefix: com.bnjdpn
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  developmentLanguage: fr
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: YES
    DEVELOPMENT_TEAM: 767SX34A7Z
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  PetitesNuits:
    type: application
    platform: iOS
    sources:
      - path: PetitesNuits
    resources:
      - path: PetitesNuits/Resources/Assets.xcassets
      - path: PetitesNuits/Resources/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bnjdpn.petitesnuits
        INFOPLIST_KEY_CFBundleDisplayName: "Petites Nuits"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.healthcare-fitness
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
    dependencies: []
    scheme:
      testTargets:
        - PetitesNuitsTests
        - PetitesNuitsUITests
      gatherCoverageData: true

  PetitesNuitsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PetitesNuitsTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bnjdpn.petitesnuits.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: PetitesNuits

  PetitesNuitsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PetitesNuitsUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bnjdpn.petitesnuits.uitests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: PetitesNuits

  PetitesNuitsScreenshotsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PetitesNuitsScreenshotsUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bnjdpn.petitesnuits.screenshotsuitests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: PetitesNuits

schemes:
  PetitesNuitsScreenshots:
    build:
      targets:
        PetitesNuits: all
        PetitesNuitsScreenshotsUITests: [test]
    test:
      gatherCoverageData: false
      targets:
        - PetitesNuitsScreenshotsUITests
